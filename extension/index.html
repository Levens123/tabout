<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Out</title>

  <!-- Google Fonts: Newsreader (for headings/numbers) + DM Sans (for body text) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">



  <!-- ================================================================
       HEADER — greeting on the left
       ================================================================ -->
  <header>
    <div class="header-left">
      <!-- "Good afternoon" — written by getGreeting() in app.js -->
      <h1 id="greeting"></h1>
      <!-- "Friday, April 4, 2026" — written by getDateDisplay() in app.js -->
      <div class="date" id="dateDisplay"></div>
    </div>

    <!-- ================================================================
         DAILY VERSE — a quiet line of poetry selected locally by date
         ================================================================ -->
    <section class="daily-verse" id="dailyVerse" aria-label="Daily verse">
      <div class="daily-verse-kicker">Daily verse</div>
      <blockquote class="daily-verse-line" id="dailyVerseLine"></blockquote>
      <div class="daily-verse-meta" id="dailyVerseMeta"></div>
    </section>
  </header>

  <!-- ================================================================
       TAB OUT DUPES BANNER — appears when you have extra Tab Out tabs open
       Hidden by default; app.js shows it when dupeTabOutCount > 1
       ================================================================ -->
  <div class="tab-cleanup-banner" id="tabOutDupeBanner" style="display:none">
    <div class="tab-cleanup-left">
      <div class="tab-cleanup-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
        </svg>
      </div>
      <div class="tab-cleanup-text">
        You have <strong id="tabOutDupeCount"></strong> Tab Out tabs open. Keep just this one?
      </div>
    </div>
    <button class="tab-cleanup-btn" data-action="close-tabout-dupes">Close extras</button>
  </div>

  <!-- ================================================================
       MAIN CONTENT AREA — three-column layout
       Left:   Today Board (work-day todo list, sticky)
       Center: Open tabs (domain/mission cards)
       Right:  Saved for later checklist (sticky)
       The right column only renders when it has items (JS controls this).
       Today Board lives inside dashboard-columns so it shares the
       sticky-rail rhythm with Saved for later instead of stealing
       a whole horizontal band above the grid.
       ================================================================ -->
  <div class="dashboard-columns" id="dashboardColumns">

    <!-- ================================================================
         LEFT COLUMN: TODAY BOARD — work-day todo list
         ----------------------------------------------------------------
         Storage layer in app.js: chrome.storage.sync (cross-device) +
         chrome.storage.local mirror + 14-day snapshots.
         Fixed-width sticky column so it doesn't push the open-tabs
         grid out of the viewport when todos pile up.
         ================================================================ -->
    <section class="today-board" id="todayBoard" aria-label="Today's todo list">
      <div class="today-board-header">
        <h2 class="today-board-title">Today</h2>
        <div class="today-board-line"></div>
        <div class="today-board-progress" id="todayBoardProgress">
          <span class="todo-progress-text" id="todoProgressText">0 / 0</span>
        </div>
        <button class="today-board-add-btn" data-action="todo-focus-input"
                title="Add a todo (⌘K)">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
               stroke-width="1.8" stroke="currentColor" width="14" height="14">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
        </button>
        <button class="today-board-icon-btn" data-action="todo-heatmap-toggle"
                title="Show last 7 days">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
               stroke-width="1.6" stroke="currentColor" width="13" height="13">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3.75 13.5h16.5m-16.5 4.5h16.5m-16.5-9h16.5m-16.5-4.5h16.5" />
          </svg>
        </button>
        <button class="today-board-icon-btn" data-action="todo-settings-toggle"
                title="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
               stroke-width="1.6" stroke="currentColor" width="13" height="13">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
          </svg>
        </button>
        <!-- Lightweight collapse toggle — sits at the far right per UX
             choice. Rotates between ▾ (expanded) and ▸ (collapsed). -->
        <button class="today-board-collapse-btn" data-action="todo-collapse-toggle"
                id="todoCollapseBtn"
                title="Collapse / expand">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
               stroke-width="1.8" stroke="currentColor" width="13" height="13"
               id="todoCollapseChevron">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="m4.5 15.75 7.5-7.5 7.5 7.5" />
          </svg>
        </button>
      </div>

      <!-- Collapsed-state summary line (shown only when collapsed) -->
      <div class="today-board-summary" id="todoSummary" style="display:none"></div>

      <!-- Everything below is the "expanded" body. Hidden when collapsed. -->
      <div class="today-board-body" id="todoBoardBody">

        <!-- Quick-add input. Hidden until + or ⌘K. -->
        <div class="todo-input-row" id="todoInputRow" style="display:none">
            <input type="text" class="todo-input" id="todoInput"
                 placeholder="What needs doing today? End with ! or ? · drag to reorder…"
                 autocomplete="off"
                 maxlength="200">
          <span class="todo-input-hint">↵ add · esc close</span>
        </div>

        <!-- 7-day heatmap, collapsed until toggled -->
        <div class="todo-heatmap" id="todoHeatmap" style="display:none">
          <div class="todo-heatmap-grid" id="todoHeatmapGrid"></div>
          <div class="todo-heatmap-legend">last 7 days</div>
        </div>

        <!-- Active todos — wrapped in a scroll container so the card
             height stays fixed regardless of how many items there are. -->
        <div class="todo-list-scroll" id="todoListScroll">
          <ul class="todo-list" id="todoList"></ul>
        </div>

        <!-- Empty state — shown only when there is literally nothing today -->
        <div class="todo-empty" id="todoEmpty" style="display:none">
          A clean slate.<span class="todo-empty-hint">Press <kbd>⌘K</kbd> to begin.</span>
        </div>

        <!-- Done section: dynamic header + scrollable list. The header
             button toggles visibility of the done list when it gets long.
             Visible only when there is at least one done item today. -->
        <div class="todo-done-section" id="todoDoneSection" style="display:none">
          <button class="todo-done-toggle" data-action="todo-done-toggle"
                  id="todoDoneToggle">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke-width="1.8" stroke="currentColor" width="11" height="11"
                 class="todo-done-chevron" id="todoDoneChevron">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="m19.5 8.25-7.5 7.5-7.5-7.5" />
            </svg>
            <span id="todoDoneToggleText">0 done today</span>
          </button>
          <div class="todo-list-scroll todo-list-scroll-done" id="todoListScrollDone"
               style="display:none">
            <ul class="todo-list todo-list-done" id="todoListDone"></ul>
          </div>
        </div>

        <!-- Progress bar -->
        <div class="todo-progress-bar" id="todoProgressBar">
          <div class="todo-progress-fill" id="todoProgressFill"></div>
        </div>

        <!-- Settings drawer (export/clear). Hidden by default. -->
        <div class="todo-settings" id="todoSettings" style="display:none">
          <button class="todo-settings-item" data-action="todo-export">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke-width="1.6" stroke="currentColor" width="13" height="13">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
            Export JSON
          </button>
          <button class="todo-settings-item todo-settings-danger" data-action="todo-clear-all">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke-width="1.6" stroke="currentColor" width="13" height="13">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
            </svg>
            Clear everything
          </button>
        </div>

      </div><!-- end .today-board-body -->
    </section>

    <!-- CENTER COLUMN: Open tabs -->
    <div class="active-section" id="openTabsSection" style="display:none">
      <div class="section-header">
        <h2 id="openTabsSectionTitle">Right now</h2>
        <div class="section-line"></div>
        <div class="section-count" id="openTabsSectionCount"></div>
      </div>
      <div class="missions" id="openTabsMissions"></div>
    </div>

    <!-- RIGHT COLUMN: Saved for Later checklist -->
    <div class="deferred-column" id="deferredColumn" style="display:none">
      <div class="section-header">
        <h2>Saved for later</h2>
        <div class="section-line"></div>
        <div class="section-count" id="deferredCount"></div>
      </div>

      <!-- Active checklist items — injected by renderDeferredList() in app.js -->
      <div class="deferred-list" id="deferredList"></div>

      <!-- Empty state — shown when no active deferred tabs -->
      <div class="deferred-empty" id="deferredEmpty" style="display:none">
        Nothing saved. Living in the moment.
      </div>

      <!-- Archive section — collapsed by default -->
      <div class="deferred-archive" id="deferredArchive" style="display:none">
        <button class="archive-toggle" id="archiveToggle">
          <svg class="archive-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
          Archive
          <span class="archive-count" id="archiveCount"></span>
        </button>
        <div class="archive-body" id="archiveBody" style="display:none">
          <input type="text" class="archive-search" id="archiveSearch" placeholder="Search archived tabs...">
          <div class="archive-list" id="archiveList"></div>
        </div>
      </div>
    </div>

  </div><!-- end .dashboard-columns -->

  <!-- ================================================================
       FOOTER — global stats + refresh control
       ================================================================ -->
  <footer>
    <div class="footer-stats">
      <div class="stat">
        <div class="stat-num" id="statTabs">—</div>
        <div class="stat-label">Open tabs</div>
      </div>
    </div>
    <div class="last-refresh">
      <span style="color: var(--muted); font-size: 11px;"><a href="https://github.com/zarazhangrui/tab-out" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Tab Out</a> by <a href="https://x.com/zarazhangrui" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Zara</a></span>
    </div>
  </footer>

</div><!-- end .container -->

<!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
<div class="toast" id="toast">
  <!-- Checkmark circle icon (Heroicons outline) -->
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<!-- Personal config (gitignored) — defines LOCAL_LANDING_PAGE_PATTERNS etc. -->
<!-- If the file doesn't exist, that's fine — app.js uses sensible defaults. -->
<script src="config.local.js" onerror="/* no personal config, that's fine */"></script>

<!-- Main dashboard logic — loads last so the DOM is ready -->
<script src="app.js"></script>
</body>
</html>
